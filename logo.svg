<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <!-- Krill body - tilted forward like riding a skateboard -->
  <g transform="rotate(-8, 200, 160)">
    <!-- Main body -->
    <ellipse cx="200" cy="155" rx="65" ry="25" fill="#F4845F" stroke="#D1603D" stroke-width="2"/>

    <!-- Body segments -->
    <path d="M150 150 Q155 140 165 143" stroke="#D1603D" stroke-width="1.5" fill="none"/>
    <path d="M165 148 Q170 138 180 141" stroke="#D1603D" stroke-width="1.5" fill="none"/>
    <path d="M180 146 Q185 136 195 139" stroke="#D1603D" stroke-width="1.5" fill="none"/>
    <path d="M215 144 Q220 134 230 138" stroke="#D1603D" stroke-width="1.5" fill="none"/>
    <path d="M230 146 Q235 136 245 140" stroke="#D1603D" stroke-width="1.5" fill="none"/>

    <!-- Tail fan -->
    <path d="M260 148 Q285 132 290 142 Q280 147 265 150" fill="#F4845F" stroke="#D1603D" stroke-width="1.5"/>
    <path d="M260 154 Q290 151 293 158 Q280 161 265 157" fill="#F4845F" stroke="#D1603D" stroke-width="1.5"/>
    <path d="M260 160 Q285 170 287 177 Q275 173 263 163" fill="#F4845F" stroke="#D1603D" stroke-width="1.5"/>

    <!-- Head -->
    <ellipse cx="140" cy="150" rx="22" ry="20" fill="#F7A58C" stroke="#D1603D" stroke-width="2"/>

    <!-- Eye - looking forward excitedly -->
    <circle cx="132" cy="143" r="6" fill="white" stroke="#333" stroke-width="1.5"/>
    <circle cx="130" cy="142" r="3" fill="#333"/>
    <circle cx="129" cy="141" r="1.2" fill="white"/>

    <!-- Excited eyebrow -->
    <path d="M126 135 Q131 131 137 134" stroke="#D1603D" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Big grin -->
    <path d="M127 155 Q135 164 143 157" stroke="#D1603D" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Antennae - swept back by wind -->
    <path d="M125 138 Q140 110 160 100" stroke="#D1603D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M130 136 Q148 112 165 108" stroke="#D1603D" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Antenna tips -->
    <circle cx="160" cy="100" r="2.5" fill="#F4845F"/>
    <circle cx="165" cy="108" r="2.5" fill="#F4845F"/>

    <!-- Arms out for balance -->
    <!-- Front arm - stretched forward -->
    <path d="M135 165 Q120 175 110 168 Q105 162 108 155" stroke="#D1603D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Back arm - stretched back -->
    <path d="M155 168 Q170 180 180 175 Q185 170 182 163" stroke="#D1603D" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Legs going down to the board -->
    <!-- Front leg -->
    <path d="M155 175 Q150 192 148 200" stroke="#D1603D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Back leg -->
    <path d="M210 173 Q212 190 215 200" stroke="#D1603D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Skateboard - flat on the ground -->
  <!-- Deck -->
  <path d="M110 225 Q105 220 108 215 L250 210 Q258 208 260 213 Q262 218 255 222 Z" fill="#4A90D9" stroke="#2C5F8A" stroke-width="2"/>
  <!-- Deck top highlight -->
  <path d="M115 220 L248 214" stroke="#6BB0F0" stroke-width="1" opacity="0.5"/>

  <!-- Grip tape texture lines -->
  <line x1="130" y1="219" x2="132" y2="214" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="218" x2="152" y2="213" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>
  <line x1="170" y1="217" x2="172" y2="212" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>
  <line x1="190" y1="216" x2="192" y2="211" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>
  <line x1="210" y1="215" x2="212" y2="210" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>
  <line x1="230" y1="214" x2="232" y2="209" stroke="#2C5F8A" stroke-width="0.5" opacity="0.3"/>

  <!-- Front truck -->
  <rect x="122" y="225" width="25" height="6" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
  <!-- Front wheel left -->
  <circle cx="126" cy="238" r="7" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="126" cy="238" r="3" fill="#555"/>
  <!-- Front wheel right -->
  <circle cx="143" cy="237" r="7" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="143" cy="237" r="3" fill="#555"/>

  <!-- Back truck -->
  <rect x="215" y="222" width="25" height="6" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
  <!-- Back wheel left -->
  <circle cx="219" cy="235" r="7" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="219" cy="235" r="3" fill="#555"/>
  <!-- Back wheel right -->
  <circle cx="236" cy="234" r="7" fill="#333" stroke="#222" stroke-width="1.5"/>
  <circle cx="236" cy="234" r="3" fill="#555"/>

  <!-- Speed lines -->
  <line x1="270" y1="210" x2="295" y2="208" stroke="#CCC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="268" y1="218" x2="300" y2="216" stroke="#CCC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="265" y1="226" x2="290" y2="224" stroke="#CCC" stroke-width="1.5" stroke-linecap="round"/>
</svg>
